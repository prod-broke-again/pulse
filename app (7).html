<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- PROTECTED: meta type -->
    <meta name="type" value="app" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse — Центр обращений АЧПП</title>
    <meta property="og:title" content="Pulse — Омниканальный центр обработки обращений">
    <meta property="og:description" content="Рабочее место модератора для обработки обращений из Telegram, VK и Web в едином интерфейсе Портала АЧПП.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <style>
        :root {
            --color-brand: #55175e;
            --color-brand-bg: #e6e0ec;
            --color-brand-bg-dark: #1a0f1f;
            --color-brand-50: #e6e0ec;
            --color-brand-100: #b3a2c7;
            --color-brand-200: #9a5fa8;
            --color-brand-300: #8b6b9a;
            --color-brand-400: #9a5fa8;
            --color-brand-500: #5a3d6a;
            --color-brand-600: #5a3d6a;
            --color-brand-700: #55175e;
            --color-brand-800: #4a3d62;
            --color-brand-900: #3d2f4f;
            --color-brand-950: #2d1f3a;
            --color-light: #f8fafc;
            --color-dark: #1a1a1a;
            --color-accent: #e9fcff;
            --color-gray-line: #e5e7eb;
            --color-brand-hover: #4a3d62;

            --bg-app: #f3f1f5;
            --bg-sidebar: #2d1f3a;
            --bg-inbox: #ffffff;
            --bg-thread: #f8f7fa;
            --bg-composer: #ffffff;
            --bg-msg-user: #ede9f3;
            --bg-msg-mod: #55175e;
            --bg-ai: #faf8ff;
            --bg-card-hover: #f3eff7;
            --bg-titlebar: #241a2e;

            --text-primary: #1a1a1a;
            --text-secondary: #6b6578;
            --text-muted: #9b95a3;
            --text-inverse: #ffffff;
            --text-sidebar: #c4b8d4;
            --text-sidebar-active: #ffffff;

            --border-light: #e8e4ed;
            --border-medium: #d4cede;

            --status-open: #22c55e;
            --status-closed: #94a3b8;
            --status-urgent: #ef4444;
            --status-warning: #f59e0b;
            --status-unread: #55175e;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-full: 9999px;

            --shadow-sm: 0 1px 2px rgba(85,23,94,0.04);
            --shadow-md: 0 2px 8px rgba(85,23,94,0.06);
            --shadow-lg: 0 4px 16px rgba(85,23,94,0.08);

            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        [data-theme="dark"] {
            --bg-app: #18141c;
            --bg-sidebar: #1a0f1f;
            --bg-inbox: #201a26;
            --bg-thread: #1c1722;
            --bg-composer: #241e2a;
            --bg-msg-user: #2d2535;
            --bg-msg-mod: #55175e;
            --bg-ai: #261e30;
            --bg-card-hover: #2d2535;
            --bg-titlebar: #120e16;

            --text-primary: #e8e4ed;
            --text-secondary: #9b95a3;
            --text-muted: #6b6578;
            --text-inverse: #ffffff;

            --border-light: #2d2535;
            --border-medium: #3d2f4f;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-app);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* TITLEBAR */
        .titlebar {
            height: 38px;
            background: var(--bg-titlebar);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            -webkit-app-region: drag;
            user-select: none;
        }
        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .titlebar-logo {
            width: 20px;
            height: 20px;
            background: var(--color-brand-200);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .titlebar-logo i {
            font-size: 11px;
            color: #fff;
        }
        .titlebar-title {
            font-size: 12px;
            font-weight: 600;
            color: #c4b8d4;
            letter-spacing: 0.3px;
        }
        .titlebar-controls {
            display: flex;
            gap: 2px;
            -webkit-app-region: no-drag;
        }
        .titlebar-btn {
            width: 32px;
            height: 26px;
            border: none;
            background: transparent;
            color: #8b7a9e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 11px;
            transition: all 0.15s;
        }
        .titlebar-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #c4b8d4;
        }
        .titlebar-btn.close:hover {
            background: #ef4444;
            color: #fff;
        }

        /* MAIN LAYOUT */
        .app-layout {
            display: flex;
            height: calc(100vh - 38px);
        }

        /* SIDEBAR */
        .sidebar {
            width: 62px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 4px;
            flex-shrink: 0;
            border-right: 1px solid rgba(255,255,255,0.04);
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .sidebar-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: transparent;
            color: var(--text-sidebar);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-size: 17px;
            transition: all 0.2s;
            position: relative;
        }
        .sidebar-btn:hover {
            background: rgba(255,255,255,0.06);
            color: #d4c8e4;
        }
        .sidebar-btn.active {
            background: rgba(154,95,168,0.2);
            color: var(--text-sidebar-active);
        }
        .sidebar-btn .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            background: var(--status-urgent);
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }
        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        .sidebar-avatar {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-full);
            background: var(--color-brand-200);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sidebar-avatar:hover {
            opacity: 0.85;
        }

        /* INBOX */
        .inbox {
            width: 340px;
            background: var(--bg-inbox);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .inbox-header {
            padding: 18px 18px 0;
        }
        .inbox-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .inbox-title span {
            color: var(--text-primary);
        }
        .inbox-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-brand-200);
            background: var(--color-brand-50);
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }
        [data-theme="dark"] .inbox-count {
            background: rgba(154,95,168,0.15);
        }
        .inbox-tabs {
            display: flex;
            gap: 2px;
            background: var(--bg-app);
            border-radius: var(--radius-md);
            padding: 3px;
            margin-bottom: 12px;
        }
        [data-theme="dark"] .inbox-tabs {
            background: rgba(255,255,255,0.04);
        }
        .inbox-tab {
            flex: 1;
            padding: 7px 0;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 12.5px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.2s;
            font-family: var(--font);
        }
        .inbox-tab.active {
            background: var(--bg-inbox);
            color: var(--text-primary);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }
        .inbox-tab:hover:not(.active) {
            color: var(--text-secondary);
        }
        .inbox-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .inbox-search {
            flex: 1;
            position: relative;
        }
        .inbox-search input {
            width: 100%;
            padding: 8px 10px 8px 34px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-family: var(--font);
            background: var(--bg-thread);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }
        .inbox-search input::placeholder {
            color: var(--text-muted);
        }
        .inbox-search input:focus {
            border-color: var(--color-brand-200);
        }
        .inbox-search i {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--text-muted);
        }
        .filter-select {
            padding: 8px 10px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 12px;
            font-family: var(--font);
            background: var(--bg-thread);
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            min-width: 100px;
        }
        .filter-select:focus {
            border-color: var(--color-brand-200);
        }

        /* CHAT LIST */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px;
        }
        .chat-list::-webkit-scrollbar {
            width: 4px;
        }
        .chat-list::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 4px;
        }
        .chat-item {
            display: flex;
            gap: 11px;
            padding: 12px 10px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            border: 1px solid transparent;
        }
        .chat-item:hover {
            background: var(--bg-card-hover);
        }
        .chat-item.active {
            background: var(--color-brand-50);
            border-color: rgba(85,23,94,0.1);
        }
        [data-theme="dark"] .chat-item.active {
            background: rgba(154,95,168,0.1);
            border-color: rgba(154,95,168,0.15);
        }
        .chat-item.unread .chat-name {
            font-weight: 700;
        }
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            position: relative;
        }
        .chat-avatar .source-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #fff;
            border: 2px solid var(--bg-inbox);
        }
        .source-tg { background: #2AABEE; }
        .source-vk { background: #4C75A3; }
        .source-web { background: var(--color-brand-200); }
        .chat-body {
            flex: 1;
            min-width: 0;
        }
        .chat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        .chat-name {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            margin-left: 8px;
        }
        .chat-preview {
            font-size: 12.5px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }
        .chat-meta {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 5px;
        }
        .chat-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: var(--radius-full);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .tag-open {
            background: rgba(34,197,94,0.1);
            color: #16a34a;
        }
        .tag-closed {
            background: rgba(148,163,184,0.15);
            color: var(--text-muted);
        }
        .tag-urgent {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
        }
        .unread-dot {
            width: 8px;
            height: 8px;
            background: var(--status-unread);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* THREAD AREA */
        .thread-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-thread);
            min-width: 0;
        }
        .thread-header {
            padding: 14px 20px;
            background: var(--bg-inbox);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .thread-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .thread-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }
        .thread-user-info {
            min-width: 0;
        }
        .thread-user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .thread-user-meta {
            font-size: 11.5px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .thread-user-meta i {
            font-size: 10px;
        }
        .thread-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn {
            padding: 7px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 12.5px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-secondary {
            background: var(--bg-inbox);
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border-medium);
        }
        .btn-primary {
            background: var(--color-brand);
            color: #fff;
            border-color: var(--color-brand);
        }
        .btn-primary:hover {
            background: var(--color-brand-hover);
        }
        .btn-danger {
            background: transparent;
            color: #ef4444;
            border-color: rgba(239,68,68,0.2);
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.06);
        }
        .btn-ai {
            background: linear-gradient(135deg, #55175e 0%, #9a5fa8 100%);
            color: #fff;
            border-color: transparent;
        }
        .btn-ai:hover {
            opacity: 0.9;
        }
        .btn-icon {
            width: 34px;
            height: 34px;
            padding: 0;
            justify-content: center;
        }

        /* MESSAGES */
        .thread-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .thread-messages::-webkit-scrollbar {
            width: 4px;
        }
        .thread-messages::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 4px;
        }
        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-bottom: 8px;
        }
        .msg-group.user {
            align-items: flex-start;
        }
        .msg-group.mod {
            align-items: flex-end;
        }
        .msg-group.system {
            align-items: center;
        }
        .msg-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 2px;
            padding: 0 4px;
        }
        .msg-bubble {
            max-width: 520px;
            padding: 10px 14px;
            border-radius: var(--radius-lg);
            font-size: 13.5px;
            line-height: 1.55;
            word-break: break-word;
        }
        .msg-group.user .msg-bubble {
            background: var(--bg-msg-user);
            color: var(--text-primary);
            border-bottom-left-radius: var(--radius-sm);
        }
        .msg-group.mod .msg-bubble {
            background: var(--bg-msg-mod);
            color: var(--text-inverse);
            border-bottom-right-radius: var(--radius-sm);
        }
        .msg-group.system .msg-bubble {
            background: transparent;
            color: var(--text-muted);
            font-size: 11.5px;
            padding: 6px 12px;
        }
        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 4px;
            margin-top: 1px;
        }
        .msg-group.mod .msg-time {
            text-align: right;
        }
        .msg-date-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
        }
        .msg-date-divider::before,
        .msg-date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        /* AI PANEL */
        .ai-panel {
            background: var(--bg-ai);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            margin: 0 24px 12px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .ai-panel.collapsed {
            margin: 0 24px 8px;
        }
        .ai-panel-header {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.15s;
        }
        .ai-panel-header:hover {
            background: rgba(85,23,94,0.03);
        }
        [data-theme="dark"] .ai-panel-header:hover {
            background: rgba(154,95,168,0.06);
        }
        .ai-panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--color-brand-200);
        }
        .ai-panel-title i {
            font-size: 14px;
            color: var(--color-brand-200);
        }
        .ai-panel-toggle {
            font-size: 11px;
            color: var(--text-muted);
            transition: transform 0.3s;
        }
        .ai-panel.collapsed .ai-panel-toggle {
            transform: rotate(180deg);
        }
        .ai-panel-body {
            padding: 0 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ai-panel.collapsed .ai-panel-body {
            display: none;
        }
        .ai-summary {
            background: rgba(85,23,94,0.04);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-size: 12.5px;
            line-height: 1.5;
            color: var(--text-secondary);
        }
        [data-theme="dark"] .ai-summary {
            background: rgba(154,95,168,0.08);
        }
        .ai-summary-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-brand-200);
            margin-bottom: 4px;
        }
        .ai-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .ai-action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-size: 11.5px;
            font-weight: 500;
            font-family: var(--font);
            background: var(--bg-inbox);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .ai-action-btn:hover {
            border-color: var(--color-brand-200);
            color: var(--color-brand);
            background: var(--color-brand-50);
        }
        [data-theme="dark"] .ai-action-btn:hover {
            background: rgba(154,95,168,0.1);
            color: var(--color-brand-100);
        }
        .ai-action-btn i {
            font-size: 11px;
            color: var(--color-brand-200);
        }
        .ai-suggestions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .ai-suggestion {
            padding: 9px 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 12.5px;
            line-height: 1.45;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-inbox);
        }
        .ai-suggestion:hover {
            border-color: var(--color-brand-200);
            background: var(--color-brand-50);
        }
        [data-theme="dark"] .ai-suggestion:hover {
            background: rgba(154,95,168,0.08);
        }
        .ai-suggestion-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--color-brand-200);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* COMPOSER */
        .composer {
            padding: 0 24px 18px;
            background: var(--bg-thread);
        }
        .composer-box {
            background: var(--bg-composer);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .composer-box:focus-within {
            border-color: var(--color-brand-200);
        }
        .composer-textarea {
            width: 100%;
            min-height: 72px;
            max-height: 180px;
            padding: 12px 14px;
            border: none;
            outline: none;
            resize: none;
            font-size: 13.5px;
            font-family: var(--font);
            line-height: 1.5;
            background: transparent;
            color: var(--text-primary);
        }
        .composer-textarea::placeholder {
            color: var(--text-muted);
        }
        .composer-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-top: 1px solid var(--border-light);
        }
        .composer-tools {
            display: flex;
            gap: 2px;
        }
        .composer-tool {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.15s;
        }
        .composer-tool:hover {
            background: var(--bg-card-hover);
            color: var(--text-secondary);
        }
        .composer-send {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .draft-indicator {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .draft-indicator i {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* EMPTY STATE */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            padding: 40px;
        }
        .empty-state i {
            font-size: 40px;
            color: var(--border-medium);
        }
        .empty-state-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .empty-state-text {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }

        /* LOADING */
        .skeleton {
            background: linear-gradient(90deg, var(--border-light) 25%, var(--bg-card-hover) 50%, var(--border-light) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-line {
            height: 12px;
            margin-bottom: 8px;
        }
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }
        .skeleton-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .skeleton-chat-item {
            display: flex;
            gap: 11px;
            padding: 12px 10px;
        }
        .skeleton-chat-body {
            flex: 1;
        }

        /* CANNED RESPONSES DROPDOWN */
        .canned-dropdown {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background: var(--bg-inbox);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            margin-bottom: 8px;
            max-height: 240px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }
        .canned-dropdown.show {
            display: block;
        }
        .canned-item {
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border-light);
        }
        .canned-item:last-child {
            border-bottom: none;
        }
        .canned-item:hover {
            background: var(--bg-card-hover);
        }
        .canned-item-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }
        .canned-item-text {
            font-size: 11.5px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* CONTEXT MENU / DROPDOWN */
        .dropdown-menu {
            position: absolute;
            background: var(--bg-inbox);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            min-width: 180px;
            z-index: 200;
            display: none;
            overflow: hidden;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            padding: 9px 14px;
            font-size: 12.5px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
            font-family: var(--font);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .dropdown-item:hover {
            background: var(--bg-card-hover);
        }
        .dropdown-item i {
            width: 16px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
        .dropdown-divider {
            height: 1px;
            background: var(--border-light);
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--bg-inbox);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-primary);
            animation: slideInToast 0.3s ease;
            max-width: 340px;
        }
        .toast i {
            font-size: 16px;
        }
        .toast.success i { color: #22c55e; }
        .toast.error i { color: #ef4444; }
        .toast.info i { color: var(--color-brand-200); }
        @keyframes slideInToast {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ERROR STATE */
        .error-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px;
        }
        .error-state i {
            font-size: 36px;
            color: #ef4444;
        }
        .error-state-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .error-state-text {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }

        /* RESPONSIVE ADJUSTMENTS */
        @media (max-width: 1100px) {
            .inbox {
                width: 280px;
            }
        }

        /* SCROLLBAR GLOBAL */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }

        /* Composer wrapper for canned dropdown positioning */
        .composer-wrapper {
            position: relative;
        }

        /* Notification pulse */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 14px;
            align-items: center;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .ai-generating {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--color-brand-200);
        }
        .ai-generating .typing-dot {
            width: 5px;
            height: 5px;
            background: var(--color-brand-200);
        }

        /* Attachment preview */
        .msg-attachment {
            margin-top: 6px;
            padding: 8px 10px;
            background: rgba(0,0,0,0.04);
            border-radius: var(--radius-sm);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        .msg-group.mod .msg-attachment {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.8);
        }
        .msg-attachment i {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- TITLEBAR -->
    <div class="titlebar">

    // ============ HELPERS ============
    function getSourceIcon(source) {
        switch(source) {
            case 'tg': return '<i class="fa-brands fa-telegram" style="color:#fff;font-size:8px;"></i>';
            case 'vk': return '<i class="fa-brands fa-vk" style="color:#fff;font-size:8px;"></i>';
            case 'web': return '<i class="fa-solid fa-globe" style="color:#fff;font-size:8px;"></i>';
        }
    }
    function getSourceLabel(source) {
        switch(source) {
            case 'tg': return 'Telegram';
            case 'vk': return 'ВКонтакте';
            case 'web': return 'Веб-виджет';
        }
    }
    function getSourceClass(source) {
        switch(source) {
            case 'tg': return 'source-tg';
            case 'vk': return 'source-vk';
            case 'web': return 'source-web';
        }
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fa-solid ${icons[type]}" style="color:inherit;"></i> <span style="color:var(--text-primary);">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            toast.style.transition = 'all 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function closeAllDropdowns() {
        document.querySelectorAll('.dropdown-menu.show').forEach(d => d.classList.remove('show'));
        document.getElementById('cannedDropdown').classList.remove('show');
    }

    function toggleDropdown(btn, dropdown) {
        const rect = btn.getBoundingClientRect();
        const dd = document.getElementById(dropdown);
        const wasOpen = dd.classList.contains('show');
        closeAllDropdowns();
        if (!wasOpen) {
            dd.style.top = (rect.bottom + 4) + 'px';
            dd.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
            dd.classList.add('show');
        }
    }

    // ============ RENDER FUNCTIONS ============
    function getFilteredChats() {
        let chats = [...mockChats];

        // Tab filter
        if (state.activeTab === 'my') {
            chats = chats.filter(c => c.assignee === 'me');
        } else if (state.activeTab === 'unassigned') {
            chats = chats.filter(c => c.assignee === 'unassigned');
        }

        // Status filter
        if (state.statusFilter === 'open') {
            chats = chats.filter(c => c.status === 'open');
        } else if (state.statusFilter === 'closed') {
            chats = chats.filter(c => c.status === 'closed');
        }

        // Search
        if (state.searchQuery) {
            const q = state.searchQuery.toLowerCase();
            chats = chats.filter(c =>
                c.name.toLowerCase().includes(q) ||
                c.preview.toLowerCase().includes(q)
            );
        }

        // Sort: urgent first, then unread, then by time
        chats.sort((a, b) => {
            if (a.priority === 'urgent' && b.priority !== 'urgent') return -1;
            if (b.priority === 'urgent' && a.priority !== 'urgent') return 1;
            if (a.unread && !b.unread) return -1;
            if (b.unread && !a.unread) return 1;
            return 0;
        });

        return chats;
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        const chats = getFilteredChats();
        document.getElementById('chatCount').textContent = chats.length;

        if (chats.length === 0) {
            list.innerHTML = `
                <div class="empty-state" style="padding:40px 20px;">
                    <i class="fa-solid fa-inbox" style="font-size:32px;color:var(--border-medium);"></i>
                    <div class="empty-state-title">Нет обращений</div>
                    <div class="empty-state-text">По выбранным фильтрам обращения не найдены</div>
                </div>
            `;
            return;
        }

        list.innerHTML = chats.map(chat => `
            <div class="chat-item ${chat.id === state.activeChatId ? 'active' : ''} ${chat.unread ? 'unread' : ''}"
                 data-chat-id="${chat.id}" onclick="selectChat(${chat.id})">
                <div class="chat-avatar" style="background:${chat.color};">
                    ${chat.initials}
                    <div class="source-badge ${getSourceClass(chat.source)}">
                        ${getSourceIcon(chat.source)}
                    </div>
                </div>
                <div class="chat-body">
                    <div class="chat-top">
                        <div class="chat-name" style="color:var(--text-primary);">${chat.name}</div>
                        <div class="chat-time">${chat.time}</div>
                    </div>
                    <div class="chat-preview">${chat.preview}</div>
                    <div class="chat-meta">
                        <span class="chat-tag ${chat.status === 'open' ? 'tag-open' : 'tag-closed'}">
                            ${chat.status === 'open' ? 'Открыт' : 'Закрыт'}

                        ${chat.priority === 'urgent' ? '<span class="chat-tag tag-urgent">Срочный</span>' : ''}
                        ${chat.unread ? '<div class="unread-dot"></div>' : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderMessages(chat) {
        const container = document.getElementById('threadMessages');
        let html = '<div class="msg-date-divider">Сегодня</div>';

        chat.messages.forEach(msg => {
            if (msg.type === 'system') {
                html += `
                    <div class="msg-group system">
                        <div class="msg-bubble">${msg.text}</div>
                    </div>
                `;
            } else if (msg.type === 'user') {
                html += `
                    <div class="msg-group user">
                        <div class="msg-sender" style="color:var(--text-muted);">${chat.name}</div>
                        <div class="msg-bubble">
                            ${msg.text}
                            ${msg.attachment ? `
                                <div class="msg-attachment">
                                    <i class="fa-solid fa-file-image" style="color:var(--text-secondary);"></i>
                                    <span style="color:var(--text-secondary);">${msg.attachment.name}</span>
                                    <span style="color:var(--text-muted); font-size:10px;">${msg.attachment.size}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="msg-time">${msg.time}</div>
                    </div>
                `;
            } else if (msg.type === 'mod') {
                html += `
                    <div class="msg-group mod">
                        <div class="msg-sender" style="text-align:right; color:var(--text-muted);">${msg.sender || 'Модератор'}</div>
                        <div class="msg-bubble">${msg.text}</div>
                        <div class="msg-time">${msg.time}</div>
                    </div>
                `;
            }
        });

        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }

        document.getElementById('loadingState').style.display = 'flex';

        setTimeout(() => {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('threadContent').style.display = 'flex';

            // Header
            document.getElementById('threadAvatar').style.background = chat.color;
            document.getElementById('threadAvatar').textContent = chat.initials;
            document.getElementById('threadAvatar').style.color = '#fff';
            document.getElementById('threadUserName').textContent = chat.name;
            document.getElementById('threadUserMeta').innerHTML = `
                <span style="color:var(--text-muted);"><i class="fa-solid fa-hashtag" style="color:var(--text-muted);"></i> ${chat.id}</span>
                <span style="color:var(--text-muted);"><i class="${chat.source === 'tg' ? 'fa-brands fa-telegram' : chat.source === 'vk' ? 'fa-brands fa-vk' : 'fa-solid fa-globe'}" style="color:var(--text-muted);"></i> ${getSourceLabel(chat.source)}</span>
                <span style="color:var(--text-muted);"><i class="fa-solid fa-building" style="color:var(--text-muted);"></i> ${chat.department}</span>
            `;

            // Update close button
            const btnClose = document.getElementById('btnCloseChat');
            if (chat.status === 'closed') {
                btnClose.innerHTML = '<i class="fa-solid fa-rotate-left" style="color:inherit;"></i> Переоткрыть';
                btnClose.className = 'btn btn-secondary';
            } else {
                btnClose.innerHTML = '<i class="fa-solid fa-circle-check" style="color:inherit;"></i> Закрыть';
                btnClose.className = 'btn btn-danger';
            }

            // Messages
            renderMessages(chat);

            // AI Summary
            document.getElementById('aiSummaryText').textContent = chat.aiSummary;
            document.getElementById('aiSuggestions').style.display = 'none';

            // Restore draft
            const textarea = document.getElementById('composerInput');
            textarea.value = state.drafts[chatId] || '';
            updateDraftIndicator();

            renderChatList();
        }, 400);
    }

    function useCannedResponse(index) {
        const textarea = document.getElementById('composerInput');
        textarea.value = cannedResponses[index].text;
        document.getElementById('cannedDropdown').classList.remove('show');
        textarea.focus();
        updateDraftIndicator();
    }

    function sendMessage() {
        const textarea = document.getElementById('composerInput');
        const text = textarea.value.trim();
        if (!text || !state.activeChatId) return;

        const chat = mockChats.find(c => c.id === state.activeChatId);
        if (!chat) return;

        const now = new Date();
        const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

        chat.messages.push({
            id: chat.messages.length + 1,
            type: 'mod',
            text: text,
            time: time,
            sender: 'Мария К.'
        });

        chat.preview = text.substring(0, 60) + (text.length > 60 ? '...' : '');
        chat.time = 'Сейчас';

        textarea.value = '';
        delete state.drafts[state.activeChatId];
        updateDraftIndicator();

        renderMessages(chat);
        renderChatList();
        showToast('Сообщение отправлено', 'success');
    }

    function updateDraftIndicator() {
        const textarea = document.getElementById('composerInput');
        const indicator = document.getElementById('draftIndicator');
        if (textarea.value.trim()) {
            indicator.style.display = 'flex';
        } else {
            indicator.style.display = 'none';
        }
    }

    function toggleChatStatus() {
        if (!state.activeChatId) return;
        const chat = mockChats.find(c => c.id === state.activeChatId);
        if (!chat) return;

        if (chat.status === 'open') {
            chat.status = 'closed';
            const now = new Date();
            const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            chat.messages.push({
                id: chat.messages.length + 1,
                type: 'system',
                text: 'Чат закрыт модератором Мария К.',
                time: time
            });
            showToast('Обращение закрыто', 'success');
        } else {
            chat.status = 'open';
            const now = new Date();
            const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            chat.messages.push({
                id: chat.messages.length + 1,
                type: 'system',
                text: 'Чат переоткрыт модератором Мария К.',
                time: time
            });
            showToast('Обращение переоткрыто', 'info');
        }

        selectChat(state.activeChatId);
    }

    // AI Functions
    function generateAiDraft() {
        if (!state.activeChatId) return;
        const textarea = document.getElementById('composerInput');

        // Show generating state
        const btn = document.getElementById('aiDraft');
        btn.innerHTML = '<div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;"></div><div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;animation-delay:0.2s;"></div><div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;animation-delay:0.4s;"></div> Генерация...';
        btn.disabled = true;

        setTimeout(() => {
            const draft = aiDraftResponses[state.activeChatId] || "Здравствуйте! Спасибо за обращение. Мы рассмотрим ваш вопрос и вернемся с ответом в ближайшее время.";
            textarea.value = draft;
            updateDraftIndicator();
            textarea.focus();

            btn.innerHTML = '<i class="fa-solid fa-pen-fancy" style="color:var(--color-brand-200);"></i> Черновик ответа';
            btn.disabled = false;

            showToast('AI-черновик сгенерирован', 'info');
        }, 1200);
    }

    function generateAiVariants() {
        if (!state.activeChatId) return;
        const suggestionsEl = document.getElementById('aiSuggestions');

        const btn = document.getElementById('aiVariants');
        btn.innerHTML = '<div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;"></div><div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;animation-delay:0.2s;"></div><div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;animation-delay:0.4s;"></div> Генерация...';
        btn.disabled = true;

        setTimeout(() => {
            const variants = aiVariantsMap[state.activeChatId] || [
                { label: "Эмпатичный", text: "Благодарю за обращение! Понимаю, как это важно для вас. Давайте разберемся вместе." },
                { label: "Нейтральный", text: "Спасибо за обращение. Рассмотрим ваш вопрос и предоставим ответ." },
                { label: "Формальный", text: "Уважаемый пользователь, ваше обращение зарегистрировано. Ответ будет предоставлен в установленные сроки." },
            ];

            suggestionsEl.innerHTML = variants.map(v => `
                <div class="ai-suggestion" onclick="useAiSuggestion(this)">
                    <div class="ai-suggestion-label" style="color:var(--color-brand-200);">${v.label}</div>
                    <div style="color:var(--text-primary);">${v.text}</div>
                </div>
            `).join('');
            suggestionsEl.style.display = 'flex';

            btn.innerHTML = '<i class="fa-solid fa-list-check" style="color:var(--color-brand-200);"></i> 3 варианта';
            btn.disabled = false;
        }, 1500);
    }

    function generateAiSolution() {
        if (!state.activeChatId) return;
        const chat = mockChats.find(c => c.id === state.activeChatId);
        const suggestionsEl = document.getElementById('aiSuggestions');

        const btn = document.getElementById('aiSolution');
        btn.innerHTML = '<div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;"></div><div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;animation-delay:0.2s;"></div><div class="typing-dot" style="width:4px;height:4px;background:var(--color-brand-200);border-radius:50%;animation:typingBounce 1.4s infinite;animation-delay:0.4s;"></div> Анализ...';
        btn.disabled = true;

        setTimeout(() => {
            const solutions = {
                1: "Рекомендация: Убедиться, что пользователь успешно сбросил пароль. Если проблема повторится -- проверить настройки SMTP и добавить домен в whitelist почтового сервера. Эскалация не требуется.",
                2: "Рекомендация: Предоставить полную информацию о членстве (анкета, документы, взнос, преимущества). Направить ссылку на раздел сайта. При заинтересованности -- предложить консультацию с координатором.",
                6: "Рекомендация: СРОЧНО эскалировать в отдел модерации и этического контроля. Запросить у пользователя доказательства на ethics@achpp.ru. Инициировать проверку специалиста Иванова А.А. по регламенту.",
                4: "Рекомендация: Проверить участие в базе вебинаров. Сформировать и отправить сертификат на email из профиля. Стандартный срок: 1-2 рабочих дня.",
                7: "Рекомендация: Сообщить дату следующего потока (15 февраля 2025). Предложить раннее бронирование со скидкой. Направить ссылку на страницу программы.",
            };

            const solution = solutions[state.activeChatId] || "Рекомендация: Уточнить детали обращения и предоставить стандартный ответ по теме. При необходимости эскалировать профильному специалисту.";

            suggestionsEl.innerHTML = `
                <div class="ai-suggestion" style="border-color:var(--color-brand-200); cursor:default;">
                    <div class="ai-suggestion-label" style="color:var(--color-brand-200);">
                        <i class="fa-solid fa-lightbulb" style="color:var(--color-brand-200);"></i> Рекомендованное решение
                    </div>
                    <div style="color:var(--text-primary);">${solution}</div>
                </div>
            `;
            suggestionsEl.style.display = 'flex';

            btn.innerHTML = '<i class="fa-solid fa-lightbulb" style="color:var(--color-brand-200);"></i> Рекомендация';
            btn.disabled = false;
        }, 1800);
    }

    function useAiSuggestion(el) {
        const text = el.querySelector('div:last-child').textContent;
        const textarea = document.getElementById('composerInput');
        textarea.value = text;
        textarea.focus();
        updateDraftIndicator();
        showToast('Вариант вставлен в поле ответа', 'info');
    }

    // ============ EVENT LISTENERS ============
    document.addEventListener('DOMContentLoaded', () => {
        renderChatList();
        renderCannedResponses();

        // Tabs
        document.querySelectorAll('.inbox-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.inbox-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                state.activeTab = tab.dataset.tab;
                renderChatList();
            });
        });

        // Status filter
        document.getElementById('statusFilter').addEventListener('change', (e) => {
            state.statusFilter = e.target.value;
            renderChatList();
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            renderChatList();
        });

        // Send
        document.getElementById('btnSend').addEventListener('click', sendMessage);
        document.getElementById('composerInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                sendMessage();
            }
        });

        // Draft indicator
        document.getElementById('composerInput').addEventListener('input', () => {
            updateDraftIndicator();
            // Auto-save draft
            if (state.activeChatId) {
                const val = document.getElementById('composerInput').value;
                if (val.trim()) {
                    state.drafts[state.activeChatId] = val;
                } else {
                    delete state.drafts[state.activeChatId];
                }
            }
        });

        // Close chat
        document.getElementById('btnCloseChat').addEventListener('click', toggleChatStatus);

        // Assign dropdown
        document.getElementById('btnAssign').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown(e.currentTarget, 'assignDropdown');
        });

        // Department dropdown
        document.getElementById('btnDepartment').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown(e.currentTarget, 'departmentDropdown');
        });

        // More dropdown
        document.getElementById('btnMore').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown(e.currentTarget, 'moreDropdown');
        });

        // Dropdown items
        document.querySelectorAll('#assignDropdown .dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                closeAllDropdowns();
                const text = item.textContent.trim();
                if (text === 'Назначить на меня') {
                    if (state.activeChatId) {
                        const chat = mockChats.find(c => c.id === state.activeChatId);
                        if (chat) {
                            chat.assignee = 'me';
                            renderChatList();
                        }
                    }
                    showToast('Обращение назначено на вас', 'success');
                } else if (text === 'Снять назначение') {
                    if (state.activeChatId) {
                        const chat = mockChats.find(c => c.id === state.activeChatId);
                        if (chat) {
                            chat.assignee = 'unassigned';
                            renderChatList();
                        }
                    }
                    showToast('Назначение снято', 'info');
                } else {
                    showToast(`Назначено на ${text}`, 'success');
                }
            });
        });

        document.querySelectorAll('#departmentDropdown .dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                closeAllDropdowns();
                const dept = item.textContent.trim();
                if (state.activeChatId) {
                    const chat = mockChats.find(c => c.id === state.activeChatId);
                    if (chat) {
                        chat.department = dept;
                        selectChat(state.activeChatId);
                    }
                }
                showToast(`Переведено в отдел: ${dept}`, 'success');
            });
        });

        document.querySelectorAll('#moreDropdown .dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                closeAllDropdowns();
                const text = item.textContent.trim();
                if (text === 'Пометить срочным') {
                    if (state.activeChatId) {
                        const chat = mockChats.find(c => c.id === state.activeChatId);
                        if (chat) {
                            chat.priority = chat.priority === 'urgent' ? 'normal' : 'urgent';
                            renderChatList();
                        }
                    }
                    showToast('Приоритет обновлен', 'info');
                } else {
                    showToast(text, 'info');
                }
            });
        });

        // Canned responses
        document.getElementById('btnCanned').addEventListener('click', (e) => {
            e.stopPropagation();
            const dd = document.getElementById('cannedDropdown');
            dd.classList.toggle('show');
        });

        // Attach file
        document.getElementById('btnAttach').addEventListener('click', () => {
            showToast('Выбор файла (демо)', 'info');
        });

        // AI composer shortcut
        document.getElementById('btnAiComposer').addEventListener('click', generateAiDraft);

        // Format
        document.getElementById('btnFormat').addEventListener('click', () => {
            showToast('Форматирование текста (демо)', 'info');
        });

        // AI Panel toggle
        document.getElementById('aiPanelToggle').addEventListener('click', () => {
            const panel = document.getElementById('aiPanel');
            panel.classList.toggle('collapsed');
            state.aiPanelOpen = !panel.classList.contains('collapsed');
        });

        // AI actions
        document.getElementById('aiDraft').addEventListener('click', generateAiDraft);
        document.getElementById('aiVariants').addEventListener('click', generateAiVariants);
        document.getElementById('aiSolution').addEventListener('click', generateAiSolution);

        // Retry
        document.getElementById('btnRetry').addEventListener('click', () => {
            if (state.activeChatId) selectChat(state.activeChatId);
        });

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            if (state.theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '<i class="fa-solid fa-sun" style="color:inherit;"></i>';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('themeToggle').innerHTML = '<i class="fa-solid fa-moon" style="color:inherit;"></i>';
            }
        });

        // Close dropdowns on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown-menu') && !e.target.closest('.btn')) {
                closeAllDropdowns();
            }
        });

        // Sidebar nav
        document.querySelectorAll('.sidebar-btn[data-view]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-btn[data-view]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                if (view !== 'chats') {
                    showToast(`Раздел "${btn.title}" (демо)`, 'info');
                }
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Escape to close dropdowns
            if (e.key === 'Escape') {
                closeAllDropdowns();
            }
        });
    });
    </script>
</body>
</html>
