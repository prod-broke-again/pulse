services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pulse-app
    container_name: pulse-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: .env.docker
        required: false
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-pulse}
      DB_USERNAME: ${MYSQL_USER:-pulse}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
    networks:
      - pulse
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: pulse-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pulse
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: pulse-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pulse}
      MYSQL_USER: ${MYSQL_USER:-pulse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - pulse

  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    restart: unless-stopped
    networks:
      - pulse

  queue:
    image: pulse-app
    container_name: pulse-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: .env.docker
        required: false
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: ${MYSQL_DATABASE:-pulse}
      DB_USERNAME: ${MYSQL_USER:-pulse}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: >
      php artisan queue:work redis
      --sleep=3
      --tries=3
      --timeout=90
      --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - pulse

  scheduler:
    image: pulse-app
    container_name: pulse-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: .env.docker
        required: false
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: ${MYSQL_DATABASE:-pulse}
      DB_USERNAME: ${MYSQL_USER:-pulse}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
    command: php artisan schedule:work
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - pulse

  reverb:
    image: pulse-app
    container_name: pulse-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: .env.docker
        required: false
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: ${MYSQL_DATABASE:-pulse}
      DB_USERNAME: ${MYSQL_USER:-pulse}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_PORT: 8080
    command: php artisan reverb:start
    ports:
      - "${REVERB_PORT:-8081}:8080"
    networks:
      - pulse
    depends_on:
      - app
      - redis

  ssr:
    image: pulse-app
    container_name: pulse-ssr
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - path: .env.docker
        required: false
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: ${MYSQL_DATABASE:-pulse}
      DB_USERNAME: ${MYSQL_USER:-pulse}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
    command: php artisan inertia:start-ssr
    depends_on:
      - app
    networks:
      - pulse

networks:
  pulse:
    driver: bridge

volumes:
  mysql_data:
